<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>物件共有</title>
<style>
  :root{
    --bg:#F2F0EA;
    --card:#FFFFFF;
    --ink:#22282F;
    --sub:#6B675C;
    --line:#DAD5C8;
    --line-strong:#C4BEAC;
    --accent-main:#2C4870;
    --accent-main-bg:#E4EAF1;
    --accent-small:#A6491F;
    --accent-small-bg:#F3E3DA;
    --danger:#A32D2D;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  }
  *{box-sizing:border-box;}
  #app{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    padding:20px 16px 60px;
    max-width:760px;
    margin:0 auto;
    min-height:400px;
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:2px solid var(--ink);
    padding-bottom:12px;
    margin-bottom:18px;
  }
  .header h1{
    font-size:20px;
    font-weight:700;
    margin:0;
    letter-spacing:.02em;
  }
  .header .today{
    font-family:var(--mono);
    font-size:12px;
    color:var(--sub);
  }
  .backup-row{
    display:flex;
    justify-content:flex-end;
    margin-bottom:14px;
    position:relative;
  }
  .menu-wrap{ position:relative; }
  .hamburger-btn{
    width:36px;
    height:32px;
    border:1px solid var(--line-strong);
    border-radius:6px;
    background:var(--card);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
  }
  .hamburger-btn span{
    display:block;
    width:16px;
    height:2px;
    background:var(--ink);
    border-radius:1px;
  }
  .hamburger-btn:hover{ border-color:var(--ink); }
  .dropdown-menu{
    position:absolute;
    top:38px;
    right:0;
    background:var(--card);
    border:1px solid var(--line-strong);
    border-radius:8px;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
    min-width:190px;
    z-index:30;
    overflow:hidden;
  }
  .dropdown-menu button{
    display:block;
    width:100%;
    text-align:left;
    padding:10px 14px;
    font-family:var(--sans);
    font-size:13px;
    color:var(--ink);
    background:none;
    border:none;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .dropdown-menu button:last-child{ border-bottom:none; }
  .dropdown-menu button:hover{ background:#F2F0EA; }
  .backup-btn{
    font-family:var(--mono);
    font-size:11px;
    color:var(--sub);
    background:none;
    border:1px solid var(--line-strong);
    border-radius:4px;
    padding:5px 9px;
    cursor:pointer;
  }
  .backup-btn:hover{ color:var(--ink); border-color:var(--ink); }
  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:16px;
  }
  .tab-btn{
    flex:1;
    padding:10px 12px;
    border:1.5px solid var(--line-strong);
    border-bottom:none;
    background:#E9E6DD;
    color:var(--sub);
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    border-radius:8px 8px 0 0;
    font-family:var(--sans);
  }
  .tab-btn.active.main{
    background:var(--card);
    color:var(--accent-main);
    border-color:var(--accent-main);
    border-bottom:2px solid var(--card);
    margin-bottom:-2px;
  }
  .tab-btn.active.small{
    background:var(--card);
    color:var(--accent-small);
    border-color:var(--accent-small);
    border-bottom:2px solid var(--card);
    margin-bottom:-2px;
  }
  .panel{
    border-top:2px solid var(--ink);
    padding-top:14px;
  }
  .entry{
    display:flex;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:6px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .stub{
    width:46px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:12px 0;
    font-family:var(--mono);
    font-size:11px;
    color:#fff;
    border-right:2px dashed rgba(255,255,255,.5);
    writing-mode:vertical-rl;
    text-orientation:mixed;
    letter-spacing:.05em;
  }
  .stub.main{ background:var(--accent-main); }
  .stub.small{ background:var(--accent-small); }
  .entry-body{
    flex:1;
    padding:14px 16px;
    min-width:0;
  }
  .row-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:8px;
  }
  .title-input{
    flex:1;
    font-size:15px;
    font-weight:700;
    border:none;
    border-bottom:1px solid transparent;
    background:transparent;
    color:var(--ink);
    padding:2px 0;
    font-family:var(--sans);
  }
  .title-input:focus{
    outline:none;
    border-bottom:1px solid var(--line-strong);
  }
  .del-btn{
    font-family:var(--mono);
    font-size:11px;
    color:var(--sub);
    background:none;
    border:1px solid var(--line);
    border-radius:4px;
    padding:4px 8px;
    cursor:pointer;
    flex-shrink:0;
  }
  .del-btn:hover{ color:var(--danger); border-color:var(--danger); }
  .confirm-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--danger);
  }
  .confirm-row button{
    font-family:var(--sans);
    font-size:12px;
    padding:3px 8px;
    border-radius:4px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
  }
  .confirm-row button.yes{ background:var(--danger); color:#fff; border-color:var(--danger); }
  .date-stamp{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
    margin-bottom:10px;
  }
  .date-stamp label{
    font-family:var(--mono);
    font-size:11px;
    color:var(--sub);
    margin-left:6px;
  }
  .date-stamp label:first-child{ margin-left:0; }
  .date-input{
    font-family:var(--mono);
    font-size:12px;
    border:1px solid var(--line-strong);
    border-radius:4px;
    padding:4px 6px;
    background:#fdfcf9;
    color:var(--ink);
  }
  .staff-input{
    font-family:var(--sans);
    font-size:12.5px;
    border:1px solid var(--line-strong);
    border-radius:4px;
    padding:4px 8px;
    background:#fdfcf9;
    color:var(--ink);
    width:110px;
  }
  .notes{
    width:100%;
    min-height:64px;
    resize:vertical;
    border:1px solid var(--line);
    border-radius:6px;
    padding:8px 10px;
    font-family:var(--sans);
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink);
    background:#fdfcf9;
    margin-bottom:10px;
  }
  .notes:focus{ outline:none; border-color:var(--line-strong); }
  .notes::placeholder{ color:#B5B0A2; }
  .images-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  .thumb-wrap{
    position:relative;
    width:64px;
    height:64px;
    border-radius:6px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .thumb-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    cursor:pointer;
    display:block;
  }
  .thumb-del{
    position:absolute;
    top:2px;
    right:2px;
    width:18px;
    height:18px;
    line-height:16px;
    text-align:center;
    background:rgba(0,0,0,.6);
    color:#fff;
    border-radius:50%;
    font-size:12px;
    cursor:pointer;
    border:none;
    padding:0;
  }
  .add-img-btn{
    width:64px;
    height:64px;
    border:1.5px dashed var(--line-strong);
    border-radius:6px;
    background:none;
    color:var(--sub);
    font-size:11px;
    font-family:var(--sans);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    line-height:1.3;
  }
  .add-img-btn:hover{ border-color:var(--sub); }
  .add-entry-btn{
    width:100%;
    padding:12px;
    border:1.5px dashed var(--line-strong);
    border-radius:8px;
    background:none;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    font-family:var(--sans);
  }
  .add-entry-btn.main{ color:var(--accent-main); }
  .add-entry-btn.small{ color:var(--accent-small); }
  .add-entry-btn:hover{ background:#0000000a; }
  .lightbox{
    position:absolute;
    inset:0;
    background:rgba(20,18,14,.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:20;
    padding:20px;
  }
  .lightbox img{
    max-width:100%;
    max-height:80vh;
    border-radius:4px;
  }
  .lightbox-close{
    position:absolute;
    top:16px;
    right:16px;
    background:#fff;
    border:none;
    border-radius:50%;
    width:32px;
    height:32px;
    font-size:16px;
    cursor:pointer;
  }
  .save-hint{
    font-family:var(--mono);
    font-size:11px;
    color:var(--sub);
    text-align:right;
    margin-bottom:10px;
    min-height:14px;
    transition:opacity .3s;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    font-size:13px;
    padding:30px 0;
  }
  .warn-banner{
    background:#F7E7C7;
    border:1px solid #C99A3A;
    color:#5A4210;
    font-size:12.5px;
    padding:10px 12px;
    border-radius:6px;
    margin-bottom:14px;
    line-height:1.6;
  }  @media (max-width: 480px){
    #app{ padding:14px 10px 50px; }
    .header h1{ font-size:17px; }
    .header .today{ font-size:11px; }
    .tab-btn{ font-size:13px; padding:9px 6px; }
    .stub{ width:34px; font-size:10px; }
    .entry-body{ padding:12px; }
    .title-input{ font-size:14px; }
    .thumb-wrap, .add-img-btn{ width:56px; height:56px; }
    .staff-input{ width:90px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  var firebaseConfig = {
    apiKey: "AIzaSyBoay-bQlMaGaxIRgGn9Xg-TOxndlOUHNE",
    authDomain: "bukken-kyouyu.firebaseapp.com",
    projectId: "bukken-kyouyu",
    storageBucket: "bukken-kyouyu.firebasestorage.app",
    messagingSenderId: "534539775885",
    appId: "1:534539775885:web:be7031ebd8a4202845d7c4"
  };
  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();
</script>
<script>
(function(){
  var state = { main: [], small: [], activeTab: 'main' };
  var loaded = { main:false, small:false };
  var saveTimers = {};
  var storageStatus = 'checking';

  var pendingRenderNeeded = false;
  var seeding = { main:false, small:false };
  var menuOpen = false;

  function requestRender(){
    var active = document.activeElement;
    var appEl = document.getElementById('app');
    if(active && appEl && appEl.contains(active) && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')){
      pendingRenderNeeded = true;
    } else {
      render();
    }
  }

  function collRef(cat){ return db.collection(cat + '_projects'); }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function todayStr(){
    var d = new Date();
    return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  }

  function seed(cat){
    if(cat==='main'){
      return [
        {id:uid(), title:'ニレミックス', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'ヒダカファーム', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'千歳ナガワハウス（苫小牧ナガワ）', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'室蘭ナガワハウス（登別ナガワ）', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'苫小牧柏原ナガワハウス内装工事（ナガワ岡山営業所　髙橋様依頼）', date:'', staff:'神山', notes:'施工時期　9月末', images:[]}
      ];
    } else {
      return [
        {id:uid(), title:'笹原邸　換気扇不具合', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'金剛園ろまん亭洗い場エアコン不具合', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'岩見沢ナガワ少量危険物確認申請', date:'', staff:'神山', notes:'', images:[]},
        {id:uid(), title:'澄川町アパート床下収納庫取付　進興工業依頼', date:'', staff:'神山', notes:'', images:[]}
      ];
    }
  }

  function seedCat(cat){
    seeding[cat] = true;
    var items = seed(cat);
    var batch = db.batch();
    items.forEach(function(item, idx){
      var ref = collRef(cat).doc(item.id);
      batch.set(ref, {
        title:item.title, date:item.date, staff:item.staff,
        notes:item.notes, images:item.images, order: idx
      });
    });
    batch.commit().catch(function(err){ console.error(err); });
  }

  function listenCat(cat){
    collRef(cat).orderBy('order').onSnapshot(function(snapshot){
      var arr = [];
      snapshot.forEach(function(doc){
        var data = doc.data();
        arr.push({
          id: doc.id,
          title: data.title || '',
          date: data.date || '',
          staff: data.staff || '',
          notes: data.notes || '',
          images: data.images || [],
          order: data.order || 0
        });
      });
      if(arr.length === 0 && !loaded[cat] && !seeding[cat]){
        seedCat(cat);
        return;
      }
      state[cat] = arr;
      loaded[cat] = true;
      storageStatus = 'ok';
      requestRender();
    }, function(error){
      console.error(error);
      storageStatus = 'unavailable';
      loaded[cat] = true;
      render();
    });
  }

  var hintTimer = null;
  function showHint(msg){
    var el = document.getElementById('save-hint');
    if(!el) return;
    el.textContent = msg;
    el.style.opacity = '1';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(function(){ el.style.opacity = '0'; }, 1200);
  }

  function debouncedSaveField(cat, id, field, value){
    var key = cat+'|'+id+'|'+field;
    clearTimeout(saveTimers[key]);
    saveTimers[key] = setTimeout(function(){
      var obj = {};
      obj[field] = value;
      collRef(cat).doc(id).update(obj).then(function(){
        showHint('保存しました');
      }).catch(function(err){
        showHint('保存に失敗しました');
        console.error(err);
      });
    }, 500);
  }

  function addEntry(cat){
    var newId = uid();
    var maxOrder = state[cat].reduce(function(m,e){ return Math.max(m, e.order||0); }, 0);
    collRef(cat).doc(newId).set({
      title:'新規項目', date:'', staff:'', notes:'', images:[], order: maxOrder+1
    }).catch(function(err){
      alert('追加に失敗しました。ネット接続をご確認ください。');
      console.error(err);
    });
  }

  var pendingDelete = null;
  function askDelete(cat, id){
    pendingDelete = {cat:cat, id:id};
    render();
  }
  function cancelDelete(){
    pendingDelete = null;
    render();
  }
  function confirmDelete(){
    if(!pendingDelete) return;
    var cat = pendingDelete.cat, id = pendingDelete.id;
    pendingDelete = null;
    collRef(cat).doc(id).delete().catch(function(err){
      alert('削除に失敗しました。');
      console.error(err);
    });
    render();
  }

  function updateEntry(cat, id, field, value){
    var e = state[cat].find(function(x){ return x.id === id; });
    if(!e) return;
    e[field] = value;
    debouncedSaveField(cat, id, field, value);
  }

  function resizeImage(file, cb){
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var maxW = 700;
        var scale = Math.min(1, maxW / img.width);
        var w = Math.round(img.width * scale);
        var h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function addImages(cat, id, files){
    var e = state[cat].find(function(x){ return x.id === id; });
    if(!e) return;
    var remaining = files.length;
    var newImages = [];
    Array.prototype.forEach.call(files, function(file){
      resizeImage(file, function(dataUrl){
        newImages.push({id: uid(), src: dataUrl});
        remaining--;
        if(remaining === 0){
          var updatedImages = e.images.concat(newImages);
          e.images = updatedImages;
          render();
          collRef(cat).doc(id).update({images: updatedImages}).then(function(){
            showHint('保存しました');
          }).catch(function(err){
            alert('写真の保存に失敗しました。1件あたりの写真の合計サイズが大きすぎる可能性があります。枚数を減らすか、別の写真でお試しください。');
            console.error(err);
          });
        }
      });
    });
  }

  function deleteImage(cat, entryId, imgId){
    var e = state[cat].find(function(x){ return x.id === entryId; });
    if(!e) return;
    e.images = e.images.filter(function(im){ return im.id !== imgId; });
    render();
    collRef(cat).doc(entryId).update({images: e.images}).catch(function(err){
      console.error(err);
    });
  }

  var lightboxSrc = null;
  function openLightbox(src){ lightboxSrc = src; render(); }
  function closeLightbox(){ lightboxSrc = null; render(); }

  window.__handlers = {
    switchTab: function(tab){ state.activeTab = tab; menuOpen = false; render(); },
    toggleMenu: function(ev){
      if(ev) ev.stopPropagation();
      menuOpen = !menuOpen;
      render();
    },
    addEntry: addEntry,
    askDelete: askDelete,
    cancelDelete: cancelDelete,
    confirmDelete: confirmDelete,
    updateEntry: updateEntry,
    triggerFileInput: function(cat, id){
      var input = document.getElementById('file-'+cat+'-'+id);
      if(input) input.click();
    },
    onFileChange: function(cat, id, input){
      if(input.files && input.files.length){
        addImages(cat, id, input.files);
      }
      input.value = '';
    },
    deleteImage: deleteImage,
    openLightbox: openLightbox,
    closeLightbox: closeLightbox,
    exportData: function(){ menuOpen = false; exportData(); },
    triggerImport: function(){
      menuOpen = false;
      var input = document.getElementById('import-file');
      if(input) input.click();
      render();
    },
    onImportFile: onImportFile
  };

  function exportData(){
    var payload = { main: state.main, small: state.small, exportedAt: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = '物件共有_バックアップ_' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    showHint('バックアップを保存しました');
  }

  function onImportFile(input){
    if(!input.files || !input.files.length) return;
    var file = input.files[0];
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var data = JSON.parse(ev.target.result);
        if(data && Array.isArray(data.main) && Array.isArray(data.small)){
          if(!confirm('現在共有されているデータを、このバックアップの内容で上書きします。よろしいですか？(この操作は元に戻せません)')) return;
          replaceCollection('main', data.main);
          replaceCollection('small', data.small);
        } else {
          alert('このファイルは正しいバックアップ形式ではありません。');
        }
      } catch(e){
        alert('ファイルの読み込みに失敗しました。');
      }
    };
    reader.readAsText(file);
    input.value = '';
  }

  function replaceCollection(cat, items){
    collRef(cat).get().then(function(snapshot){
      var batch = db.batch();
      snapshot.forEach(function(doc){ batch.delete(doc.ref); });
      items.forEach(function(item, idx){
        var id = item.id || uid();
        var ref = collRef(cat).doc(id);
        batch.set(ref, {
          title: item.title || '',
          date: item.date || '',
          staff: item.staff || '',
          notes: item.notes || '',
          images: item.images || [],
          order: idx
        });
      });
      return batch.commit();
    }).then(function(){
      showHint('バックアップを読み込みました');
    }).catch(function(err){
      alert('読み込み中にエラーが発生しました。');
      console.error(err);
    });
  }

  function esc(s){
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderEntry(cat, e, idx){
    var isDeleting = pendingDelete && pendingDelete.cat === cat && pendingDelete.id === e.id;
    var stubClass = cat === 'main' ? 'main' : 'small';
    var no = String(idx+1).padStart(3,'0');
    var imagesHtml = e.images.map(function(im){
      return '<div class="thumb-wrap">'+
        '<img src="'+im.src+'" onclick="__handlers.openLightbox(\''+im.src.replace(/'/g,"")+'\')" />'+
        '<button class="thumb-del" onclick="__handlers.deleteImage(\''+cat+'\',\''+e.id+'\',\''+im.id+'\')" aria-label="画像を削除">×</button>'+
      '</div>';
    }).join('');

    var deleteControl = isDeleting
      ? '<div class="confirm-row">削除しますか？'+
          '<button onclick="__handlers.confirmDelete()" class="yes">削除する</button>'+
          '<button onclick="__handlers.cancelDelete()">キャンセル</button>'+
        '</div>'
      : '<button class="del-btn" onclick="__handlers.askDelete(\''+cat+'\',\''+e.id+'\')">削除</button>';

    return (
      '<div class="entry">'+
        '<div class="stub '+stubClass+'">No. '+no+'</div>'+
        '<div class="entry-body">'+
          '<div class="row-top">'+
            '<input class="title-input" value="'+esc(e.title)+'" '+
              'oninput="__handlers.updateEntry(\''+cat+'\',\''+e.id+'\',\'title\',this.value)" />'+
            deleteControl+
          '</div>'+
          '<div class="date-stamp">'+
            '<label>日付</label>'+
            '<input class="date-input" type="date" value="'+esc(e.date)+'" '+
              'onchange="__handlers.updateEntry(\''+cat+'\',\''+e.id+'\',\'date\',this.value)" />'+
            '<label>担当</label>'+
            '<input class="staff-input" type="text" placeholder="担当者名" value="'+esc(e.staff)+'" '+
              'oninput="__handlers.updateEntry(\''+cat+'\',\''+e.id+'\',\'staff\',this.value)" />'+
          '</div>'+
          '<textarea class="notes" placeholder="指示内容・作業メモを入力..." '+
            'oninput="__handlers.updateEntry(\''+cat+'\',\''+e.id+'\',\'notes\',this.value)">'+esc(e.notes)+'</textarea>'+
          '<div class="images-row">'+
            imagesHtml+
            '<button class="add-img-btn" onclick="__handlers.triggerFileInput(\''+cat+'\',\''+e.id+'\')">＋<br>写真</button>'+
            '<input type="file" id="file-'+cat+'-'+e.id+'" accept="image/*" multiple style="display:none" '+
              'onchange="__handlers.onFileChange(\''+cat+'\',\''+e.id+'\',this)" />'+
          '</div>'+
        '</div>'+
      '</div>'
    );
  }

  function render(){
    var app = document.getElementById('app');
    var cat = state.activeTab;
    var list = state[cat] || [];

    var html = '';
    html += '<div class="header"><h1>物件共有</h1><div class="today">'+todayStr()+'</div></div>';
    html += '<div class="backup-row">'+
      '<div class="menu-wrap">'+
        '<button class="hamburger-btn" onclick="__handlers.toggleMenu(event)" aria-label="メニュー"><span></span><span></span><span></span></button>'+
        (menuOpen ? (
          '<div class="dropdown-menu">'+
            '<button onclick="__handlers.exportData()">バックアップを保存</button>'+
            '<button onclick="__handlers.triggerImport()">バックアップを読み込む</button>'+
          '</div>'
        ) : '')+
      '</div>'+
      '<input type="file" id="import-file" accept="application/json" style="display:none" onchange="__handlers.onImportFile(this)" />'+
    '</div>';
    html += '<div class="tabs">'+
      '<button class="tab-btn main '+(cat==='main'?'active main':'')+'" onclick="__handlers.switchTab(\'main\')">物件</button>'+
      '<button class="tab-btn small '+(cat==='small'?'active small':'')+'" onclick="__handlers.switchTab(\'small\')">小規模物件</button>'+
    '</div>';
    html += '<div class="panel">';
    if(storageStatus === 'unavailable'){
      html += '<div class="warn-banner">⚠ サーバーに接続できていません。ネット接続をご確認ください。この状態では入力内容が共有・保存されない可能性があります。</div>';
    }
    html += '<div id="save-hint" class="save-hint"></div>';

    if(!loaded[cat]){
      html += '<div class="empty">読み込み中...</div>';
    } else if(list.length === 0){
      html += '<div class="empty">項目がありません。下のボタンから追加してください。</div>';
    } else {
      list.forEach(function(e, idx){ html += renderEntry(cat, e, idx); });
    }

    html += '<button class="add-entry-btn '+cat+'" onclick="__handlers.addEntry(\''+cat+'\')">＋ 新規追加</button>';
    html += '</div>';

    if(lightboxSrc){
      html += '<div class="lightbox" onclick="if(event.target===this)__handlers.closeLightbox()">'+
        '<button class="lightbox-close" onclick="__handlers.closeLightbox()">×</button>'+
        '<img src="'+lightboxSrc+'" />'+
      '</div>';
    }

    app.innerHTML = html;
  }

  render();
  document.getElementById('app').addEventListener('focusout', function(){
    setTimeout(function(){
      if(pendingRenderNeeded){ pendingRenderNeeded = false; render(); }
    }, 0);
  }, true);
  document.addEventListener('click', function(){
    if(menuOpen){ menuOpen = false; render(); }
  });
  listenCat('main');
  listenCat('small');
})();
</script>
</body>
</html>
